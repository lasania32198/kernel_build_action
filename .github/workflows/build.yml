# A simple action usage
name: Build Kernel
on:
  workflow_dispatch:

jobs:
  Build-Kernel:
    strategy:
      fail-fast: false
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Build Kernel
        uses: dabao1955/kernel_build_action@main
        with:
          kernel-url: https://github.com/lasania32198/android_kernel_hisilicon_hi6250/
          kernel-dir: hi6250
          kernel-branch: master
          config: merge_hi6250_defconfig
          arch: arm64
          aosp-gcc: true
          android-version: -9.0.0_r30
          disable-lto: true
          anykernel3: true
